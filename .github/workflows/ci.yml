name: CI

on:
  push:
    branches: [main, consolidated/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Guard script
        run: npm run guard

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          VITEST: true

      - name: Logger usage guard
        shell: pwsh
        run: ./scripts/check-logger-usage.ps1

      - name: Env contract check
        shell: pwsh
        run: ./scripts/env-contract-check.ps1

      - name: Build
        run: npm run build:vercel
        env:
          NEXT_PHASE: phase-production-build

  deployment-ready:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .gitignore excludes env files
        run: |
          if ! grep -q "^\.env$" .gitignore || ! grep -q "^\.env\.\*$" .gitignore; then
            echo "❌ .gitignore must exclude .env and .env.* files"
            exit 1
          fi
          echo "✅ .gitignore properly configured"

      - name: Check for committed secrets
        run: |
          if grep -r "AccountKey=" --include="*.ts" --include="*.js" --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ Found potential secrets in code"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  predeploy-probe:
    name: Azure Search Pre-Deploy Probe
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe Azure Search index
        shell: pwsh
        env:
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX: ${{ vars.AZURE_SEARCH_INDEX }}
          COMPANY_ID: ${{ vars.COMPANY_ID || 'amerivet' }}
        run: |
          ./scripts/predeploy-acs-probe.ps1 -Endpoint $env:AZURE_SEARCH_ENDPOINT -ApiKey $env:AZURE_SEARCH_API_KEY -Index $env:AZURE_SEARCH_INDEX -CompanyId $env:COMPANY_ID -MinDocs 10

  smoke:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: predeploy-probe
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test production
        shell: pwsh
        env:
          PROD_DOMAIN: ${{ vars.PROD_DOMAIN }}
          COMPANY_ID: ${{ vars.COMPANY_ID || 'amerivet' }}
        run: |
          if (-not $env:PROD_DOMAIN) { Write-Error 'Set repository variable PROD_DOMAIN to your production URL.'; exit 1 }
          ./scripts/smoke-test-prod.ps1 -Domain $env:PROD_DOMAIN -CompanyId $env:COMPANY_ID
